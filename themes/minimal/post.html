<!DOCTYPE html>
<html lang="zh">
<head>
<script>(function(){var t=localStorage.getItem("theme");if(!t){t=matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light";}document.documentElement.setAttribute("data-theme",t);})();</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{title}} - {{siteTitle}}</title>
<link rel="stylesheet" href="/assets/style.css">
<link rel="stylesheet" href="/assets/image.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/viewerjs@1.11.6/dist/viewer.min.css">
<link id="hljs-light" rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
<link id="hljs-dark"  rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" disabled>
<script>
MathJax={tex:{inlineMath:[['$','$'],['\\(','\\)']]}};
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
<header>
  <a class="site-name" href="/">{{siteTitle}}</a>
  <nav>
    <button class="btn-theme" onclick="toggleTheme()" title="Toggle theme">🌙</button>
    <a href="/">主页</a>
    <a href="/tags.html">标签</a>
    <a href="/categories.html">分类</a>
  </nav>
</header>

<main class="post-main">
<article class="post-article">
  <div class="article-head">
    <h1>{{title}}</h1>
    <div class="meta-bar">
      <div class="meta-left">
        <span>📅 <time>{{date}}</time></span>
        <span class="meta-sep">·</span>
        <span>🗂️ 分类: <a href="/categories/{{category}}.html">{{category}}</a></span>
      </div>
      <div class="meta-tags">{{tags}}</div>
    </div>
  </div>
  <div class="content">{{content}}</div>
</article>

<aside class="toc-sidebar">
  <div class="toc-card" id="toc">
    <div class="toc-title">Contents</div>
  </div>
</aside>
</main>

<footer>
  <p>© 2026 {{siteTitle}} · Built with <a href="https://github.com">MiniSSG</a></p>
</footer>

<script>window.__autoNumber = {{autoNumber}};</script>
<script src="/assets/theme.js"></script>
<script src="/assets/image.js"></script>
<script src="/assets/toc.js"></script>
<script>hljs.highlightAll();</script>
<script>
(function(){
  var t=document.querySelector('.meta-tags');
  if(t){var tags=t.textContent.split(/,\s*/);var h='';tags.forEach(function(x){h+='<a href=\"/tags/'+x+'.html\" class=\"tag-pill\">'+x+'</a>'});t.innerHTML=h;}
})();
</script>
</body>
</html>
