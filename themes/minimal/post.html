<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{title}} - {{siteTitle}}</title>
<style>
  :root {
    --bg: #ffffff;
    --bg-alt: #f6f8fa;
    --text: #24292f;
    --text-muted: #656d76;
    --border: #d0d7de;
    --link: #0969da;
    --code-bg: #f6f8fa;
    --accent: #0969da;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
    --toc-w: 240px;
  }
  html[data-theme="dark"] {
    --bg: #0d1117;
    --bg-alt: #161b22;
    --text: #c9d1d9;
    --text-muted: #8b949e;
    --border: #30363d;
    --link: #58a6ff;
    --code-bg: #161b22;
    --accent: #58a6ff;
    --shadow: 0 1px 3px rgba(0,0,0,0.3);
  }

  * { box-sizing:border-box; margin:0; padding:0; }
  body { font:16px/1.75 system-ui,-apple-system,sans-serif; background:var(--bg-alt); color:var(--text); min-height:100vh; }

  header { background:var(--bg); border-bottom:1px solid var(--border); padding:14px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:20; }
  .site-name { font-weight:700; font-size:18px; color:var(--text); text-decoration:none; }
  .site-name:hover { color:var(--link); }
  nav { display:flex; align-items:center; gap:18px; }
  nav a { color:var(--text-muted); text-decoration:none; font-size:15px; }
  nav a:hover { color:var(--link); }
  .btn-theme { background:none; border:1px solid var(--border); color:var(--text); font-size:16px; padding:4px 8px; border-radius:6px; cursor:pointer; }
  .btn-theme:hover { background:var(--bg-alt); }

  /* ---- main: 正文左 + 目录右 ---- */
  main { max-width:1100px; margin:32px auto; padding:0 24px; display:flex; gap:32px; align-items:flex-start; }
  article { flex:1; min-width:0; background:var(--bg); padding:36px 40px; border-radius:10px; box-shadow:var(--shadow); }
  .article-head { margin-bottom:28px; }
  .article-head h1 { font-size:1.8em; line-height:1.3; }
  time { color:var(--text-muted); font-size:14px; display:block; margin:8px 0 4px; }
  .tags { color:var(--text-muted); font-size:14px; }

  /* ---- 排版 ---- */
  .content h1 { font-size:1.6em; margin:1em 0 0.5em; }
  .content h2 { font-size:1.3em; margin:1.4em 0 0.4em; padding-bottom:6px; border-bottom:1px solid var(--border); }
  .content h3 { font-size:1.1em; margin:1.1em 0 0.3em; }
  .content p { margin:0.8em 0; }
  .content a { color:var(--link); }
  .content ul,.content ol { padding-left:24px; margin:0.6em 0; }
  .content li { margin:4px 0; }
  .content pre { background:var(--code-bg); padding:14px 18px; border-radius:8px; overflow-x:auto; font-size:14px; line-height:1.5; }
  .content code { background:var(--code-bg); padding:2px 6px; border-radius:4px; font-size:0.9em; }
  .content pre code { background:none; padding:0; }
  .content table { border-collapse:collapse; width:100%; margin:16px 0; }
  .content th,.content td { border:1px solid var(--border); padding:8px 14px; text-align:left; }
  .content th { background:var(--bg-alt); font-weight:600; }
  .content blockquote { border-left:3px solid var(--accent); margin:12px 0; padding:4px 16px; color:var(--text-muted); }
  .content img { max-width:100%; border-radius:6px; }

  /* ---- 右侧悬浮目录 ---- */
  .toc-sidebar { width:var(--toc-w); flex-shrink:0; position:sticky; top:74px; max-height:calc(100vh - 100px); overflow-y:auto; }
  .toc-card { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:18px 20px; box-shadow:var(--shadow); }
  .toc-title { font-weight:600; font-size:13px; color:var(--text-muted); margin-bottom:12px; text-transform:uppercase; letter-spacing:0.5px; }
  .toc-card ul { list-style:none; padding:0; margin:0; }
  .toc-card li { margin:3px 0; font-size:13px; line-height:1.6; }
  .toc-card li.toc-h1 { padding-left:0; }
  .toc-card li.toc-h2 { padding-left:10px; }
  .toc-card li.toc-h3 { padding-left:22px; }
  .toc-card a { color:var(--text-muted); text-decoration:none; display:block; padding:2px 0; }
  .toc-card a:hover { color:var(--link); }
  .no-toc { color:var(--text-muted); font-size:13px; }

  /* ---- footer ---- */
  footer { text-align:center; padding:32px 24px; color:var(--text-muted); font-size:13px; border-top:1px solid var(--border); margin-top:40px; }
  footer a { color:var(--link); }

  /* ---- mobile ---- */
  @media (max-width:860px) {
    main { flex-direction:column; padding:0 16px; }
    .toc-sidebar { width:100%; position:static; max-height:none; order:-1; }
    article { padding:24px 20px; }
  }
</style>
<script>
MathJax={tex:{inlineMath:[['$','$'],['\\(','\\)']]}};
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
<script>
(function(){
  var el=document.documentElement;
  var s=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  el.setAttribute('data-theme',s);
  updateBtn(s);
  window.toggleTheme=function(){
    var n=el.getAttribute('data-theme')==='dark'?'light':'dark';
    el.setAttribute('data-theme',n);
    localStorage.setItem('theme',n);
    updateBtn(n);
  };
  function updateBtn(s){var b=document.querySelector('.btn-theme');if(b)b.textContent=s==='dark'?'☀️':'🌙';}
})();
</script>
</head>
<body>
<header>
  <a class="site-name" href="/">{{siteTitle}}</a>
  <nav>
    <button class="btn-theme" onclick="toggleTheme()" title="Toggle theme">🌙</button>
    <a href="/">Home</a>
    <a href="/tags.html">Tags</a>
    <a href="/categories.html">Categories</a>
  </nav>
</header>

<main>
<article>
  <div class="article-head">
    <h1>{{title}}</h1>
    <time>{{date}}</time>
    <div class="tags">Tags: {{tags}}</div>
  </div>
  <div class="content">{{content}}</div>
</article>

<aside class="toc-sidebar">
  <div class="toc-card" id="toc">
    <div class="toc-title">Contents</div>
  </div>
</aside>
</main>

<footer>
  <p>© 2026 {{siteTitle}} · Built with <a href="https://github.com">MiniSSG</a></p>
</footer>

<script>
(function(){
  var toc=document.getElementById('toc');
  var c=document.querySelector('.content');
  if(!c){toc.querySelector('.toc-title').insertAdjacentHTML('afterend','<p class="no-toc">No headings</p>');return;}

  var hs=c.querySelectorAll('h1,h2,h3');
  if(!hs.length){toc.querySelector('.toc-title').insertAdjacentHTML('afterend','<p class="no-toc">No headings</p>');return;}

  // 层级计数器：[h1, h2, h3]
  var cnt=[0,0,0];
  var html='<ul>';
  var backendNum = {{autoNumber}};

  hs.forEach(function(h){
    var level=parseInt(h.tagName[1])-1;

    for(var i=level+1;i<3;i++) cnt[i]=0;
    cnt[level]++;

    var num='';
    for(var i=0;i<=level;i++){
      if(cnt[i]===0) break;
      if(num) num+='.';
      num+=cnt[i];
    }

    var id='s'+num.replace(/\./g,'-');
    h.id=id;

    var label = backendNum ? h.textContent : (num+' '+h.textContent);
    html+='<li class="toc-'+h.tagName.toLowerCase()+'">'
        + '<a href="#'+id+'">'+label+'</a></li>';
  });

  html+='</ul>';
  toc.querySelector('.toc-title').insertAdjacentHTML('afterend',html);
})();
</script>
</body>
</html>
