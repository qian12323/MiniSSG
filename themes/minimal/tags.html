<!DOCTYPE html>
<html lang="zh">
<head>
<script>(function(){var t=localStorage.getItem("theme");if(!t){t=matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light";}document.documentElement.setAttribute("data-theme",t);})();</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tags - {{title}}</title>
<style>
  :root {
    --bg: #ffffff;
    --bg-alt: #f6f8fa;
    --text: #24292f;
    --text-muted: #656d76;
    --border: #d0d7de;
    --link: #0969da;
    --accent: #0969da;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
  }
  html[data-theme="dark"] {
    --bg: #0d1117;
    --bg-alt: #161b22;
    --text: #c9d1d9;
    --text-muted: #8b949e;
    --border: #30363d;
    --link: #58a6ff;
    --accent: #58a6ff;
    --shadow: 0 1px 3px rgba(0,0,0,0.3);
  }

  * { box-sizing:border-box; margin:0; padding:0; }
  body { font:16px/1.75 system-ui,-apple-system,sans-serif; background:var(--bg-alt); color:var(--text); min-height:100vh; }

  header { background:var(--bg); border-bottom:1px solid var(--border); padding:14px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
  .site-name { font-weight:700; font-size:18px; color:var(--text); text-decoration:none; }
  nav { display:flex; align-items:center; gap:18px; }
  nav a { color:var(--text-muted); text-decoration:none; font-size:15px; }
  nav a:hover { color:var(--link); }
  .btn-theme { background:none; border:1px solid var(--border); color:var(--text); font-size:16px; padding:4px 8px; border-radius:6px; cursor:pointer; }
  .btn-theme:hover { background:var(--bg-alt); }

  main { max-width:800px; margin:32px auto; padding:0 24px; }
  .page-head { background:var(--bg); padding:36px 40px; border-radius:10px; box-shadow:var(--shadow); margin-bottom:24px; }
  .page-head h1 { font-size:1.5em; }

  .tag-group { background:var(--bg); border-radius:10px; box-shadow:var(--shadow); padding:24px 40px; margin-bottom:20px; }
  .tag-group h2 { font-size:1.1em; color:var(--link); }
  .tag-count { color:var(--text-muted); font-size:0.85em; font-weight:normal; }
  .tag-group ul { list-style:none; padding:8px 0 0; }
  .tag-group li { padding:4px 0; font-size:15px; }
  .tag-group li a { color:var(--text); text-decoration:none; }
  .tag-group li a:hover { color:var(--link); }
  .post-date { color:var(--text-muted); font-size:13px; margin-left:10px; }
  .view-all { list-style:none; padding-top:6px; }
  .view-all a { color:var(--link); font-size:13px; }

  footer { text-align:center; padding:32px 24px; color:var(--text-muted); font-size:13px; border-top:1px solid var(--border); margin-top:40px; }
  footer a { color:var(--link); }
</style>
<script>
(function(){
  var el=document.documentElement;
  updateBtn(el.getAttribute("data-theme"));
  window.toggleTheme=function(){
    var n=el.getAttribute('data-theme')==='dark'?'light':'dark';
    el.setAttribute('data-theme',n);
    localStorage.setItem('theme',n);
    updateBtn(n);
  };
  function updateBtn(s){var b=document.querySelector('.btn-theme');if(b)b.textContent=s==='dark'?'☀️':'🌙';}
})();
</script>
</head>
<body>
<header>
  <a class="site-name" href="/">{{title}}</a>
  <nav>
    <button class="btn-theme" onclick="toggleTheme()" title="Toggle theme">🌙</button>
    <a href="/">Home</a>
    <a href="/tags.html">Tags</a>
    <a href="/categories.html">Categories</a>
  </nav>
</header>

<main>
<div class="page-head">
  <h1>Tags</h1>
</div>
{{groups}}
</main>

<footer>
  <p>© 2026 {{title}} · Built with <a href="https://github.com">MiniSSG</a></p>
</footer>
</body>
</html>
