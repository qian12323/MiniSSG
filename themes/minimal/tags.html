<!DOCTYPE html>
<html lang="zh">
<head>
<script>(function(){var t=localStorage.getItem("theme");if(!t){t=matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light";}document.documentElement.setAttribute("data-theme",t);})();</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tags - {{title}}</title>
<link rel="stylesheet" href="/assets/style.css">
<script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.6/dist/vis-network.min.js"></script>
</head>
<body>
<header>
  <a class="site-name" href="/">{{title}}</a>
  <nav>
    <button class="btn-theme" onclick="toggleTheme()" title="Toggle theme">🌙</button>
    <a href="/">主页</a>
    <a href="/tags.html">标签</a>
    <a href="/categories.html">分类</a>
  </nav>
</header>

<main>
<div class="page-head">
  <h1>Tags</h1>
  <div class="tag-graph-wrap">
    <div id="tag-graph" class="tag-graph"></div>
    <div class="graph-ctrl">
      <button class="gbtn" id="gfit">↺</button>
      <button class="gbtn" id="gout">−</button>
      <button class="gbtn" id="gin">+</button>
    </div>
  </div>
</div>
{{groups}}
</main>

<footer>
  <p>© 2026 {{title}} · Built with <a href="https://github.com">MiniSSG</a></p>
</footer>

<script src="/assets/theme.js"></script>
<script>window.__graphData={{graphData}};</script>
<script src="/assets/graph.js"></script>
<script>
(function(){
  document.querySelectorAll('.card-tags').forEach(function(t){
    var tags=t.textContent.split(/,\s*/).filter(Boolean);
    var h=''; tags.forEach(function(x){h+='<a href=\"/tags/'+x+'.html\" class=\"tag-pill\">'+x+'</a>'});t.innerHTML=h;
  });
})();
</script>
</body>
</html>
