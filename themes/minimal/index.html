<!DOCTYPE html>
<html lang="zh">
<head>
<script>(function(){var t=localStorage.getItem("theme");if(!t){t=matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light";}document.documentElement.setAttribute("data-theme",t);})();</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{title}}</title>
<link rel="stylesheet" href="/assets/style.css">
<script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.6/dist/vis-network.min.js"></script>
</head>
<body>
<header>
  <a class="site-name" href="/">{{title}}</a>
  <nav>
    <button class="btn-theme" onclick="toggleTheme()" title="Toggle theme">🌙</button>
    <a href="/">主页</a>
    <a href="/tags.html">标签</a>
    <a href="/categories.html">分类</a>
  </nav>
</header>

<main class="index-main">
<div class="index-content">
<div class="hero">
  <h1>{{title}}</h1>
  <p>{{description}}</p>
  <div id="heatmap" class="heatmap"></div>
</div>

{{posts}}
</div>

<aside class="index-sidebar">
  <div class="side-card search-card">
    <h3>搜索</h3>
    <input type="text" id="searchInput" class="search-input" placeholder="按标题搜索...">
  </div>

  <div class="side-card filter-card">
    <div class="filter-head">
      <h3>过滤</h3>
      <button class="filter-reset" id="filterReset">↺</button>
    </div>

    <div class="filter-label">Tags</div>
    <div id="filter-graph" class="filter-graph"></div>

    <div class="filter-label">Categories</div>
    <div id="filter-cats" class="filter-cats"></div>
  </div>

  {{sidebar}}
</aside>
</main>

<footer>
  <p>© 2026 {{title}} · Built with <a href="https://github.com">MiniSSG</a></p>
</footer>

<script src="/assets/theme.js"></script>
<script>window.__postDates={{postDates}};window.__postCounts={{postCounts}};</script>
<script src="/assets/heatmap.js"></script>
<script>window.__filterTagGraph={{filterTagGraph}};window.__filterCatCloud={{filterCatCloud}};</script>
<script src="/assets/filter.js"></script>
<script>
document.getElementById('searchInput').addEventListener('input', function() {
  var q = this.value.toLowerCase();
  document.querySelectorAll('.index-card').forEach(function(c) {
    var title = c.querySelector('h3');
    if (!title) return;
    if (!q || title.textContent.toLowerCase().indexOf(q)>=0) c.classList.remove('filtered');
    else c.classList.add('filtered');
  });
});
</script>

<button id="backTop" class="back-top" title="回到顶部">↑</button>
<script>
(function(){
  var btn = document.getElementById('backTop');
  function toggle() { btn.style.display = window.scrollY > 300 ? '' : 'none'; }
  window.addEventListener('scroll', toggle);
  toggle();
  btn.addEventListener('click', function() {
    window.scrollTo({top:0, behavior:'smooth'});
  });
})();
</script>
<script>
(function(){
  document.querySelectorAll('.card-tags').forEach(function(t){
    var tags=t.textContent.split(/,\s*/).filter(Boolean);
    var h=''; tags.forEach(function(x){h+='<a href=\"/tags/'+x+'.html\" class=\"tag-pill\">'+x+'</a>'});t.innerHTML=h;
  });
})();
</script>
</body>
</html>
