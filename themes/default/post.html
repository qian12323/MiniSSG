<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{title}}</title>
<style>
  body { max-width:720px; margin:40px auto; padding:0 20px; font:16px/1.7 system-ui,sans-serif; color:#333; }
  time { color:#888; font-size:14px; }
  .tags { margin-top:20px; color:#666; font-size:14px; }
  pre { background:#f5f5f5; padding:12px; overflow-x:auto; border-radius:4px; }
  code { background:#f5f5f5; padding:2px 6px; border-radius:3px; }
</style>
</head>
<body>
<article>
<h1>{{title}}</h1>
<time>{{date}}</time>
<div class="content">{{content}}</div>
<div class="tags">Tags: {{tags}}</div>
</article>
</body>
</html>
