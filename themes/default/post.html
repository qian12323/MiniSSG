<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{title}} - {{siteTitle}}</title>
<style>
  body { max-width:720px; margin:40px auto; padding:0 20px; font:16px/1.7 system-ui,sans-serif; color:#333; }
  nav { margin-bottom:28px; padding-bottom:12px; border-bottom:1px solid #eee; }
  nav a { color:#0366d6; text-decoration:none; margin-right:20px; }
  nav a:hover { text-decoration:underline; }
  time { color:#888; font-size:14px; }
  .tags { margin-top:4px; margin-bottom:20px; color:#666; font-size:14px; }
  pre { background:#f5f5f5; padding:12px; overflow-x:auto; border-radius:4px; }
  code { background:#f5f5f5; padding:2px 6px; border-radius:3px; }
  table { border-collapse:collapse; width:100%; margin:16px 0; }
  th,td { border:1px solid #ddd; padding:8px 12px; text-align:left; }
  th { background:#f5f5f5; font-weight:600; }
  tr:nth-child(even) { background:#fafafa; }
</style>
<script>
MathJax={tex:{inlineMath:[['$','$'],['\\(','\\)']]}};
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
<body>
<nav>
  <a href="/">Home</a>
  <a href="/tags.html">Tags</a>
  <a href="/categories.html">Categories</a>
</nav>
<article>
<h1>{{title}}</h1>
<time>{{date}}</time>
<div class="tags">Tags: {{tags}}</div>
<div class="content">{{content}}</div>
</article>
</body>
</html>
